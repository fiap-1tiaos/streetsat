service: streetsat

provider:
  name: aws
  runtime: python3.12
  stage: ${opt:stage, 'dev'}
  region: us-east-1
  versionFunctions: false
  environment:
    S3_BUCKET: streetsat-models-${self:provider.stage}
    SQS_INFERENCE_QUEUE_URL: !Ref InferenceQueue
    SQS_ALERTS_QUEUE_URL: !Ref AlertQueue
    SNS_TOPIC_ARN: !Ref AlertTopic
    COMPREHEND_ENABLED: "false"
    NASA_API_KEY: ${env:NASA_API_KEY, 'DEMO_KEY'}
    DATABASE_URL: 'postgresql+pg8000://streetsat:streetsat_dev@postgres:5432/streetsat_db'
    REDIS_URL: 'redis://redis:6379'

functions:
  scraper:
    handler: aws/lambda/handler_scraper.lambda_handler
    timeout: 300
    memorySize: 512
    events:
      - schedule:
          rate: cron(*/5 * * * ? *)
          enabled: true
    package:
      patterns:
        - "src/scrapers/**"
        - "src/apis/**"
        - "aws/lambda/handler_scraper.py"

  inference:
    handler: aws/lambda/handler_inference.lambda_handler
    timeout: 60
    memorySize: 1024
    events:
      - sqs:
          arn: !GetAtt InferenceQueue.Arn
          batchSize: 10
    package:
      patterns:
        - "src/ml/**"
        - "src/data/**"
        - "src/nlp/**"
        - "aws/lambda/handler_inference.py"

  alerter:
    handler: aws/lambda/handler_alerts.lambda_handler
    timeout: 30
    memorySize: 256
    events:
      - sqs:
          arn: !GetAtt AlertQueue.Arn
          batchSize: 5
    package:
      patterns:
        - "aws/lambda/handler_alerts.py"

  api:
    handler: src/api/fastapi_app.handler
    timeout: 29
    memorySize: 512
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY
    package:
      patterns:
        - "src/api/**"
        - "src/routing/**"

resources:
  Resources:
    ScrapingQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: streetsat-scraping-${self:provider.stage}
        VisibilityTimeout: 300

    InferenceQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: streetsat-inference-${self:provider.stage}
        VisibilityTimeout: 60

    AlertQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: streetsat-alerts-${self:provider.stage}
        VisibilityTimeout: 30

    AlertTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: streetsat-alerts-${self:provider.stage}

    ModelBucket:
      Type: AWS::S3::Bucket
      DeletionPolicy: Retain
      Properties:
        BucketName: streetsat-models-${self:provider.stage}
        VersioningConfiguration:
          Status: Enabled

plugins:
  - serverless-localstack

package:
  individually: true
  patterns:
    - "!**"
    - "src/core/**"
    - "src/utils/**"
    - "src/db/**"
    - "!**/__pycache__/**"
    - "!**/*.pyc"

custom:
  localstack:
    debug: true
    stages:
      - dev
    host: http://localhost
    edgePort: 4566
    autostart: false

  pythonRequirements:
    dockerizePip: true
    strip: true
    zip: false
    slim: true
    slimPatternsAppendDefaults: false
    requirementsFile: ./requirements-lambda.txt
    useDownloadCache: true
    useStaticCache: true
    slimPatterns:
      - "**/__pycache__/**"
      - "**/*.pyc"
      - "**/*.pyo"
      - "**/tests/**"
      - "**/test/**"
      - "**/docs/**"
      - "**/doc/**"
      - "**/examples/**"
    noDeploy:
      - boto3
      - botocore
      - s3transfer
      - matplotlib
      - seaborn
      - plotly
      - dash
      - dash-bootstrap-components
      - folium
      - geopandas
      - shapely
      - geopy
      - xgboost
      - httpx
      - apscheduler
      - motor
      - pymongo
      - psycopg2-binary
      - greenlet
      - uvloop
      - watchfiles
      - websockets
