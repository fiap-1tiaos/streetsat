services:
  postgres:
    image: postgres:16-alpine
    container_name: streetsat-postgres
    environment:
      POSTGRES_USER: streetsat
      POSTGRES_PASSWORD: streetsat_dev
      POSTGRES_DB: streetsat_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streetsat"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: streetsat-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: streetsat-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: streetsat-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,lambda,sqs,sns,cloudwatch,logs,iam,events,cloudformation,ssm,sts,apigateway,apigatewayv2
      DEBUG: 0
      LAMBDA_EXECUTOR: local
      DOCKER_HOST: unix:///var/run/docker.sock
      LOCALSTACK_TMPDIR: /var/lib/localstack/tmp
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  api:
    build: .
    container_name: streetsat-api
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      S3_BUCKET: streetsat-models-dev
    command: >
      sh -c "uvicorn src.api.fastapi_app:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      localstack:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: streetsat-web
    ports:
      - "5174:5174"
    environment:
      API_TARGET: http://api:8000
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  localstack_data:

networks:
  default:
    name: streetsat-network
